name: Bug report
description: Report a defect that should be fixed in this repository.
title: "[Bug] "
labels:
  - bug
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line bug summary.
      placeholder: Build command fails on non-UI project bootstrap
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduce Steps
      description: Provide exact commands and order.
      placeholder: |
        1. Run ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happened instead (error text/logs).
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Why this matters (blocked workflow, wrong output, etc.).
    validations:
      required: true
